<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Podcast por Bloques V36</title>
<style>
  :root{
    --bg1:#f7fbff;--bg2:#eef4ff;--card:#ffffff;--txt:#172033;--mut:#65758b;
    --line:#d7e2f0;--accent:#4f8cff;--accent2:#9ad7ff;--danger:#ff6b7a;--ok:#3ccf91;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--txt)}
  .app{max-width:1280px;margin:0 auto;padding:18px}
  header{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:14px}
  h1{font-size:25px;margin:0;letter-spacing:-.02em}.hint{color:var(--mut);font-size:14px;margin-top:4px}
  .panel{background:var(--card);border:1px solid #e3edf8;border-radius:26px;padding:18px;box-shadow:0 18px 55px rgba(45,79,120,.13)}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px;overflow:visible}
  button{border:0;border-radius:16px;padding:11px 12px;font-weight:800;color:#162033;background:#edf4ff;cursor:pointer;box-shadow:0 7px 18px rgba(65,95,130,.14);white-space:nowrap;touch-action:manipulation}
  button:hover{filter:brightness(1.02);transform:translateY(-1px)} button:disabled{opacity:.45;cursor:not-allowed;transform:none}
  .app.isRecording .controls button:not(#stopBtn), .app.isRecording .controls label{opacity:.38;filter:grayscale(.18);pointer-events:none}
  .app.isRecording #stopBtn{opacity:1;pointer-events:auto;filter:none}
  .app.isRecording .drop{opacity:.55;pointer-events:none}
  .app.isRecording .block:not(.recordingLive), .app.isRecording .silenceBlock{cursor:not-allowed;pointer-events:none}
  .rec{background:#ff5c72;color:white}.stop{background:#ffd166;color:#3b2600}.play{background:#8ef1bf}.pause{background:#ffe7a3}.export{background:#9ad7ff}.save{background:#cfc2ff}.open{background:#ffc4e8}
  .save.unsaved{background:#ffb13d;color:#402600;animation:softSavePulse .85s ease-in-out infinite}
  @keyframes softSavePulse{0%,100%{background-color:#ffd18a}50%{background-color:#ff9f1f}}
  .save.unsaved:hover{filter:none;transform:none}
  input[type=range]{width:110px;accent-color:var(--accent)} label{font-weight:700;color:#344255;font-size:14px;white-space:nowrap;display:flex;align-items:center;gap:6px}
  .drop{border:2px dashed #b9cbe0;border-radius:22px;padding:16px;text-align:center;color:var(--mut);margin-bottom:14px;background:#f8fbff;font-weight:700}
  .drop.drag{border-color:var(--accent);background:#eaf3ff;color:#0f4fb5}
  .timelineWrap{position:relative;padding:22px 14px 42px;background:#f9fcff;border-radius:24px;min-height:260px;border:1px solid #e3edf8;overflow-x:auto;overflow-y:hidden;scroll-behavior:smooth;clip-path:inset(0 round 24px);overscroll-behavior-x:contain}
  .timelineWrap::-webkit-scrollbar{height:8px}.timelineWrap::-webkit-scrollbar-thumb{background:#c9d8e8;border-radius:20px}.timelineWrap::-webkit-scrollbar-track{background:transparent}
  .timeline{display:flex;gap:10px;align-items:stretch;min-height:175px;position:relative;width:100%;min-width:100%;padding-right:2px}.timeline.recordingMode{width:100%;min-width:100%;overflow:hidden}
  .timeline.recordingMode .block{min-width:24px;padding-left:10px;padding-right:10px}
  .timeline.recordingMode .block:not(.recordingLive) .name{padding-right:20px}
  .timeline.recordingMode .silenceBlock{min-width:18px;padding-left:5px;padding-right:5px}
  .timeline.recordingMode .recordingLive{min-width:72px;flex-shrink:0}
  .block{position:relative;height:170px;border-radius:24px;padding:30px 12px 18px;display:flex;flex-direction:column;justify-content:center;gap:12px;cursor:grab;user-select:none;touch-action:manipulation;border:1px solid rgba(0,0,0,.06);box-shadow:inset 0 1px 0 rgba(255,255,255,.65),0 12px 28px rgba(45,79,120,.14);overflow:hidden;min-width:42px;max-width:100%;transition:flex-basis .08s linear,width .12s ease, transform .12s ease;transform-origin:left center}
  .block.external{height:128px;margin-top:22px;border-style:dashed;background:#dde8f5!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.75),0 8px 20px rgba(45,79,120,.10);gap:9px;padding-top:30px}.block.external .name{font-size:12px;padding-right:24px}.block.external .name:before{content:"Ext. · ";font-weight:900;color:#53667d}.block:active{cursor:grabbing;transform:scale(.99)}.block:hover{box-shadow:inset 0 0 0 3px rgba(79,140,255,.18),inset 0 1px 0 rgba(255,255,255,.65),0 12px 28px rgba(45,79,120,.14)}.block.selected{outline:none;box-shadow:inset 0 0 0 4px rgba(79,140,255,.55),inset 0 1px 0 rgba(255,255,255,.65),0 12px 28px rgba(45,79,120,.14);transform:translateY(-2px)}
  .silenceBlock{position:relative;align-self:center;height:74px;border-radius:16px;padding:8px 9px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;cursor:pointer;user-select:none;border:2px dashed #b8c8da;background:#eef4fb;color:#53667d;box-shadow:inset 0 1px 0 rgba(255,255,255,.75),0 7px 18px rgba(45,79,120,.08);overflow:hidden;min-width:30px;transition:width .2s ease,transform .12s ease}
  .silenceBlock:hover{outline:3px solid rgba(79,140,255,.18);transform:translateY(-1px)}
  .silenceTitle{font-size:11px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .silenceDur{font-size:12px;font-weight:900;opacity:.8}
  .name{font-weight:900;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:rgba(10,20,35,.86);padding-right:30px}.dur{font-size:12px;font-weight:800;opacity:.75;color:rgba(10,20,35,.78)}
  .del{position:absolute;right:9px;top:8px;width:28px;height:28px;border-radius:50%;padding:0;background:rgba(255,255,255,.78);color:#243142;box-shadow:none;line-height:24px;font-size:16px}
  .playhead{position:absolute;top:10px;bottom:18px;width:4px;background:rgba(20,35,55,.72);border-radius:8px;left:12px;display:none;pointer-events:none;z-index:20;box-shadow:0 0 0 9999px rgba(80,120,160,.035),0 0 13px rgba(20,35,55,.28)}
  .empty{color:var(--mut);padding:26px;text-align:center;width:100%;border-radius:18px;background:white;border:1px dashed #d5e3f2;font-weight:700}
  .status{margin-top:12px;color:var(--mut);font-size:14px;font-weight:650}.status.unsaved{color:#d87a00}.status.saved{color:#2a9d66}.mini{font-size:12px;color:var(--mut);font-weight:700}
  .projectInput{display:none}.toolsLine{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.meter{position:absolute;right:18px;bottom:12px;display:none;align-items:center;gap:10px;padding:9px 14px;border-radius:17px;background:#fff3f5;border:1px solid #ffd4dc;color:#d83b53;font-weight:900;min-height:48px;z-index:30;box-shadow:0 8px 22px rgba(216,59,83,.12)}.meter.on{display:inline-flex}.bars{display:flex;gap:4px;align-items:center;height:44px}.bar{width:6px;height:8px;border-radius:6px;background:#ff5c72;transition:height .05s linear}

  .block.recordingLive{cursor:default;background:linear-gradient(135deg,#ff7890,#ffd1d9)!important;color:#3b1118;outline:none;box-shadow:inset 0 0 0 3px rgba(255,92,114,.30),inset 0 1px 0 rgba(255,255,255,.65),0 12px 28px rgba(45,79,120,.14);min-width:72px;transform:none!important;transform-origin:left center}
  .block.recordingLive:active{cursor:default;transform:none}.block.recordingLive:hover{box-shadow:inset 0 0 0 3px rgba(255,92,114,.38),inset 0 1px 0 rgba(255,255,255,.65),0 12px 28px rgba(45,79,120,.14)}
  .block.recordingLive .name,.block.recordingLive .dur{position:relative;z-index:2;color:#3b1118;text-shadow:0 1px 0 rgba(255,255,255,.36)}
  .block.recordingLive:before{content:"";position:absolute;inset:-90px;background:repeating-linear-gradient(45deg,rgba(255,255,255,.10) 0 16px,rgba(255,255,255,.58) 16px 34px,rgba(255,255,255,.10) 34px 58px);animation:none;z-index:1;will-change:transform}
  .block.recordingLive:after{content:"";position:absolute;left:0;right:0;bottom:0;height:42%;background:linear-gradient(180deg,rgba(255,255,255,0),rgba(255,255,255,.34));z-index:1}
  @keyframes liveStripes{from{transform:translate3d(-70px,70px,0)}to{transform:translate3d(70px,-70px,0)}}
  @media(max-width:900px){input[type=range]{width:135px}}
  @media(max-width:640px){.app{padding:10px}.panel{padding:12px}.timelineWrap{min-height:230px}.timeline{min-height:150px}.block{height:148px;border-radius:22px}.name{font-size:13px}button{padding:11px 12px}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div><h1>Podcast por Bloques</h1><div class="hint">Grabá partes, arrastrá audios externos, ordenalos y exportá un solo audio final.</div></div>
    <div class="mini">Funciona local en el navegador.</div>
  </header>
  <div class="panel">
    <div class="controls">
      <button id="recBtn" class="rec">● Grabar</button>
      <button id="stopBtn" class="stop" disabled>■ Detener</button>
      <button id="playBtn" class="play" disabled>▶ Reproducir</button>
      <button id="pauseBtn" class="pause" disabled>⏸ Pausar</button>
      <label>Volumen <input id="vol" type="range" min="0" max="1" step="0.01" value="1"></label>
      <button id="wavBtn" class="export" disabled>Exportar WAV</button>
      <button id="saveBtn" class="save" disabled>Guardar proyecto ZIP</button>
      <button id="loadBtn" class="open">Abrir ZIP</button>
      <button id="addAudioBtn" class="open">Agregar audio</button>
      <input id="projectFile" class="projectInput" type="file" accept=".zip,application/zip">
      <input id="audioFile" class="projectInput" type="file" accept="audio/*,video/*" multiple>
    </div>
    <div id="drop" class="drop">Arrastrá acá un ZIP de proyecto, o arrastrá un audio/video sobre los bloques para insertarlo entre partes.</div>
    <div class="timelineWrap" id="wrap"><div class="playhead" id="head"></div><div class="timeline" id="timeline"><div class="empty">Todavía no hay audios. Tocá “Grabar”.</div></div><div id="meter" class="meter"><span>Grabando</span><div class="bars" id="bars"><i class="bar"></i><i class="bar"></i><i class="bar"></i><i class="bar"></i><i class="bar"></i><i class="bar"></i><i class="bar"></i><i class="bar"></i></div></div></div>
    <div class="status" id="status">Listo.</div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
let mediaRecorder, chunks=[], blocks=[], playing=false, currentAudio=null, raf=0, startIndex=0, micStream=null, audioCtxLive=null, analyser=null, meterRaf=0, playCtx=null, playSources=[], playStartedAt=0, playOffset=0, playRunId=0;
let recordingLive=false, recordingStart=0, recordingLiveDuration=0, recordingLiveRaf=0;
let recordingBusy=false;
let hayCambiosSinGuardar=false;
const DEFAULT_SILENCE=2;
const colors=['#9ad7ff','#9ff0c8','#ffe38f','#ffc2df','#d6c8ff','#ffb0b8','#b7f1ff','#ffd2a6','#c7ed9f','#e0e7ff'];
const $=id=>document.getElementById(id);
const recBtn=$('recBtn'), stopBtn=$('stopBtn'), playBtn=$('playBtn'), pauseBtn=$('pauseBtn'), wavBtn=$('wavBtn'), saveBtn=$('saveBtn'), timeline=$('timeline'), status=$('status'), head=$('head'), vol=$('vol'), meter=$('meter'), bars=[...$('bars').querySelectorAll('.bar')];
function actualizarBotonGuardar(){
  if(!saveBtn) return;
  const activo=hayCambiosSinGuardar && blocks.length>0;
  saveBtn.classList.toggle('unsaved', activo);
  saveBtn.textContent='Guardar proyecto ZIP';
}
function marcarSinGuardar(msg){
  hayCambiosSinGuardar=true;
  status.classList.remove('saved');
  status.classList.add('unsaved');
  actualizarBotonGuardar();
  if(msg) status.textContent=msg;
}
function marcarGuardado(msg){
  hayCambiosSinGuardar=false;
  status.classList.remove('unsaved');
  status.classList.add('saved');
  actualizarBotonGuardar();
  if(msg) status.textContent=msg;
}
window.addEventListener('beforeunload',function(e){
  if(hayCambiosSinGuardar){
    e.preventDefault();
    e.returnValue='';
  }
});
function fmt(s){s=Math.max(0,Math.round(s)); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}
function getPauseAfter(i){return Math.max(0, Number(blocks[i]?.pauseAfter ?? DEFAULT_SILENCE) || 0)}
function totalDurationWithPauses(list=blocks){return list.reduce((a,b,i)=>a+Math.max(.2,b.duration||1)+(i<list.length-1?Math.max(0,Number(b.pauseAfter ?? DEFAULT_SILENCE)||0):0),0)}
function offsetWithPauses(untilIndex){let t=0; for(let i=0;i<untilIndex;i++){t+=Math.max(.2,blocks[i].duration||1); if(i<blocks.length-1)t+=getPauseAfter(i);} return t;}
function estaGrabando(){return !!(recordingBusy || recordingLive || (mediaRecorder && mediaRecorder.state==='recording'));}
function pedirSilencio(i){if(estaGrabando()) return; const actual=getPauseAfter(i); const txt=prompt('¿Cuántos segundos de silencio querés entre estos dos audios?', String(actual)); if(txt===null)return; const val=Number(String(txt).replace(',', '.')); if(!isFinite(val)||val<0){alert('Poné un número válido, por ejemplo 1, 2 o 3.5'); return;} blocks[i].pauseAfter=Math.min(60, val); marcarSinGuardar('Cambios sin guardar: silencio ajustado.'); render();}
function updateBtns(){const has=blocks.length>0; const rec=estaGrabando(); document.querySelector('.app')?.classList.toggle('isRecording', rec); playBtn.disabled=rec||!has||playing; wavBtn.disabled=rec||!has; saveBtn.disabled=rec||!has; pauseBtn.disabled=rec||!playing; recBtn.disabled=rec||playing; stopBtn.disabled=!rec; $('loadBtn').disabled=rec; $('addAudioBtn').disabled=rec; playBtn.textContent='▶ Reproducir'; pauseBtn.textContent='⏸ Pausar'; stopBtn.textContent='■ Detener';}
function escapeHtml(s){return String(s).replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function esVistaAngosta(){
  return window.matchMedia && window.matchMedia('(max-width: 640px)').matches;
}
function mantenerScrollHorizontal(scrollValue){
  const wrapEl=$('wrap');
  if(!wrapEl) return;
  const prevBehavior=wrapEl.style.scrollBehavior;
  wrapEl.style.scrollBehavior='auto';
  const fix=()=>{
    wrapEl.scrollLeft=scrollValue;
  };
  fix();
  requestAnimationFrame(fix);
  setTimeout(fix,40);
  setTimeout(fix,120);
  setTimeout(()=>{
    fix();
    wrapEl.style.scrollBehavior=prevBehavior;
  },260);
}
function renderConScrollQuieto(){
  const wrapEl=$('wrap');
  const keepScroll=wrapEl ? wrapEl.scrollLeft : 0;
  render();
  mantenerScrollHorizontal(keepScroll);
}
function render(){
  timeline.classList.toggle('recordingMode', recordingLive);
  timeline.innerHTML='';
  if(!blocks.length && !recordingLive){startIndex=0; timeline.innerHTML='<div class="empty">Todavía no hay audios. Tocá “Grabar”.</div>'; head.style.display='none'; updateBtns(); actualizarBotonGuardar(); return;}
  const liveDur=recordingLive ? Math.max(.2, recordingLiveDuration||.2) : 0;
  const totalDur=totalDurationWithPauses()+liveDur+(recordingLive&&blocks.length?DEFAULT_SILENCE:0);
  const itemCount=blocks.length+(recordingLive?1:0);
  const gapTotal=(Math.max(0,itemCount*2-2))*10;
  const wrapWidth=($('wrap')?.clientWidth||900)-28;
  // Durante la grabación, el ancho se calcula contra TODO lo visible, incluido el bloque vivo.
  // Así, cuando llega al margen derecho, no forcejea con el scroll: se reacomodan
  // los anchos internos y el bloque sigue creciendo desde su lugar real.
  const recBaseDur=Math.max(4,totalDur);
  const safeWidth=Math.max(220, wrapWidth-18);
  let pxPerSec=recordingLive?Math.max(3,Math.min(46,(safeWidth-gapTotal)/recBaseDur)):0;
  if(recordingLive){
    // V25: mientras se graba, el bloque vivo no entra desde afuera ni pelea
    // contra el borde derecho. El borde derecho queda anclado dentro de la máscara
    // y, al crecer, comprime suavemente los bloques anteriores hacia la izquierda.
    const minAudio=24, minSil=18, minLive=72;
    const minExisting=blocks.reduce((a,b,i)=>a+minAudio+(i<blocks.length-1?minSil:0),0);
    const fixedMins=minExisting+(blocks.length?minSil:0)+minLive;
    const roomForTimeline=Math.max(1, safeWidth-gapTotal);
    if(fixedMins>roomForTimeline){
      pxPerSec=Math.max(1.4, roomForTimeline/Math.max(1,totalDur));
    }else{
      const natural=totalDur*pxPerSec;
      if(natural>roomForTimeline) pxPerSec=Math.max(1.4, roomForTimeline/Math.max(1,totalDur));
    }
  }
  const flexAudio=(dur,den,gaps)=> recordingLive ? ('1 1 '+Math.max(24, dur*pxPerSec).toFixed(1)+'px') : ('0 1 calc('+((Math.max(.2,dur)/den)*100).toFixed(4)+'% - '+gaps.toFixed(2)+'px)');
  const flexSilence=(dur,den,gaps)=> recordingLive ? ('1 1 '+Math.max(18, dur*pxPerSec).toFixed(1)+'px') : ('0 1 calc('+((Math.max(.05,dur)/den)*100).toFixed(4)+'% - '+gaps.toFixed(2)+'px)');
  const flexLive=(dur)=> {
    const minAudio=24, minSil=18;
    const minExisting=blocks.reduce((a,b,i)=>a+minAudio+(i<blocks.length-1?minSil:0),0)+(blocks.length?minSil:0);
    const maxLive=Math.max(72, safeWidth-gapTotal-minExisting);
    return '0 0 '+Math.min(maxLive, Math.max(72, dur*pxPerSec)).toFixed(1)+'px';
  };
  blocks.forEach((b,i)=>{
    const el=document.createElement('div'); el.className='block'+(b.external?' external':'')+(i===startIndex?' selected':''); el.draggable=true; el.style.background=b.color; el.style.flex=flexAudio(Math.max(.2,b.duration||1), totalDur, gapTotal/Math.max(1,blocks.length*2-1)); el.dataset.id=b.id;
    el.innerHTML=`<button class="del" title="Borrar">×</button><div class="name">${i+1}</div><div class="dur">${fmt(b.duration)}</div>`;
    el.querySelector('.del').onclick=(ev)=>{ev.stopPropagation(); if(estaGrabando()) return; if(!confirm('¿Estás seguro de que querés borrar este bloque?')) return; blocks=blocks.filter(x=>x.id!==b.id); if(startIndex>=blocks.length)startIndex=Math.max(0,blocks.length-1); marcarSinGuardar('Cambios sin guardar: bloque borrado.'); render();};
    function jump(){
      if(estaGrabando()) return;
      startIndex=i;
      status.textContent='Ubicado al inicio del bloque '+(i+1)+'. Doble toque sobre el bloque para escuchar desde ahí.';
      renderConScrollQuieto();
    }
    let lastTap=0;
    el.onclick=(ev)=>{ev.preventDefault(); jump();};
    el.ondblclick=(ev)=>{ev.preventDefault(); jump(); setTimeout(()=>playSingle(i),40);};
    // V36 iPad: Safari a veces no dispara dblclick sobre estos bloques.
    // Detecto doble toque manual y reproduzco el bloque.
    el.addEventListener('touchend',(ev)=>{
      if(estaGrabando()) return;
      const now=Date.now();
      if(now-lastTap<360){
        ev.preventDefault();
        jump();
        setTimeout(()=>playSingle(i),40);
        lastTap=0;
      }else{
        lastTap=now;
      }
    },{passive:false});
    el.ondragstart=e=>{ if(estaGrabando()){e.preventDefault(); return;} e.dataTransfer.setData('text/plain',b.id); };
    el.ondragover=e=>e.preventDefault();
    el.ondrop=e=>{e.preventDefault(); if(estaGrabando()) return; const from=e.dataTransfer.getData('text/plain'), to=b.id; if(from===to)return; const a=blocks.findIndex(x=>x.id===from), c=blocks.findIndex(x=>x.id===to); const [m]=blocks.splice(a,1); blocks.splice(c,0,m); marcarSinGuardar('Cambios sin guardar: orden modificado.'); render();};
    timeline.appendChild(el);
    if(i<blocks.length-1){
      const p=getPauseAfter(i);
      const sl=document.createElement('div');
      sl.className='silenceBlock';
      sl.style.flex=flexSilence(Math.max(.05,p), totalDur, gapTotal/Math.max(1,blocks.length*2-1));
      sl.innerHTML=`<div class="silenceTitle">Silencio</div><div class="silenceDur">${p.toFixed(p%1?1:0)}s</div>`;
      sl.title='Tocar para cambiar segundos de silencio';
      sl.onclick=(ev)=>{ev.preventDefault(); ev.stopPropagation(); pedirSilencio(i);};
      timeline.appendChild(sl);
    }
  });
  if(recordingLive){
    if(blocks.length){
      const sl=document.createElement('div');
      sl.className='silenceBlock';
      sl.style.flex=flexSilence(Math.max(.05,DEFAULT_SILENCE), totalDur, gapTotal/Math.max(1,itemCount*2-1));
      sl.innerHTML=`<div class="silenceTitle">Silencio</div><div class="silenceDur">${DEFAULT_SILENCE}s</div>`;
      timeline.appendChild(sl);
    }
    const el=document.createElement('div');
    el.className='block recordingLive selected';
    el.draggable=false;
    el.style.flex=flexLive(Math.max(.2,liveDur));
    el.innerHTML=`<div class="name">● Grabando...</div><div class="dur">${fmt(liveDur)}</div>`;
    timeline.appendChild(el);
    // El bloque vivo queda contenido por cálculo de anchos: no forzamos scroll,
    // así evitamos el titileo contra la máscara derecha.
  }
  updateBtns();
  actualizarBotonGuardar();
}
async function blobDuration(blob){return new Promise(res=>{const a=document.createElement('audio'); a.preload='metadata'; a.onloadedmetadata=()=>{URL.revokeObjectURL(a.src); res(isFinite(a.duration)?a.duration:1)}; a.onerror=()=>res(1); a.src=URL.createObjectURL(blob);});}
async function getMic(){
  if(micStream && micStream.active) return micStream;
  micStream=await navigator.mediaDevices.getUserMedia({audio:true});
  setupMeter(micStream);
  return micStream;
}
function setupMeter(stream){
  try{
    audioCtxLive=audioCtxLive||new (window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtxLive.createAnalyser(); analyser.fftSize=256;
    const source=audioCtxLive.createMediaStreamSource(stream); source.connect(analyser);
  }catch(e){}
}
function startMeter(){
  meter.classList.add('on');
  const data=new Uint8Array(analyser?analyser.frequencyBinCount:0);
  let smoothLevel=.18;
  const loop=()=>{
    let level=.18;
    if(analyser){
      analyser.getByteTimeDomainData(data);
      let sum=0;
      for(let i=0;i<data.length;i++){
        const v=(data[i]-128)/128;
        sum+=v*v;
      }
      const rms=Math.sqrt(sum/(data.length||1));
      // Más sensible para voz: levanta aunque el micrófono venga bajo,
      // pero con suavizado para que no se vuelva loco.
      level=Math.min(1, rms*8.5);
    }
    smoothLevel=smoothLevel*.68 + level*.32;
    bars.forEach((bar,i)=>{
      const pulse=(Math.sin(Date.now()/95+i*.85)+1)*.5;
      const h=7 + Math.max(0,Math.min(1, smoothLevel*.95 + pulse*.18))*42*(.72+(i%4)*.10);
      bar.style.height=Math.max(6,Math.min(44,h))+'px';
    });
    meterRaf=requestAnimationFrame(loop);
  };
  loop();
}
function stopMeter(){cancelAnimationFrame(meterRaf); meter.classList.remove('on'); bars.forEach(b=>b.style.height='5px');}

function releaseMic(){
  // Importante en celulares: liberar el micrófono al terminar,
  // para que WhatsApp, llamadas u otras apps no lo vean como ocupado.
  try{
    if(micStream){
      micStream.getTracks().forEach(track=>track.stop());
      micStream=null;
    }
  }catch(e){}
  try{
    if(audioCtxLive){
      audioCtxLive.close().catch(()=>{});
      audioCtxLive=null;
    }
  }catch(e){}
  analyser=null;
}
function startLiveRecordingBlock(){
  recordingLive=true;
  // Arranque corto y constante: aparece en su lugar y en menos de medio segundo
  // ya está creciendo, sin acumular demora cuando hay muchos audios.
  recordingStart=performance.now()-420;
  recordingLiveDuration=.42;
  let lastRender=0;
  const loop=(now)=>{
    if(!recordingLive)return;
    recordingLiveDuration=(performance.now()-recordingStart)/1000;
    // Limito el render a ~20 fps para que no se atrase con muchos bloques.
    // Las rayas CSS siguen animando solas, sin tocar su comportamiento.
    if(!lastRender || now-lastRender>50){
      render();
      lastRender=now;
    }
    recordingLiveRaf=requestAnimationFrame(loop);
  };
  recordingLiveRaf=requestAnimationFrame(loop);
}
function stopLiveRecordingBlock(){
  recordingLive=false;
  cancelAnimationFrame(recordingLiveRaf);
  recordingLiveDuration=0;
}

recBtn.onclick=async()=>{try{
  if(estaGrabando()) return;
  recordingBusy=true;
  updateBtns();
  const stream=await getMic();
  chunks=[];
  status.textContent='Preparando micrófono... empezá a hablar cuando diga “Grabando”.';
  // Pequeña espera para no capturar el clic/toque inicial, pero corta para que el bloque vivo aparezca rápido.
  await new Promise(r=>setTimeout(r,80));
  mediaRecorder=new MediaRecorder(stream);
  mediaRecorder.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};
  mediaRecorder.onstop=async()=>{
    stopMeter();
    stopLiveRecordingBlock();
    releaseMic();
    let rawBlob=new Blob(chunks,{type:mediaRecorder.mimeType||'audio/webm'});
    let blob=await trimBlobEnd(rawBlob,0.32);
    const dur=await blobDuration(blob);
    blocks.push({id:crypto.randomUUID(),name:'Audio '+(blocks.length+1),duration:dur,color:colors[blocks.length%colors.length],blob,type:blob.type,filename:'audio-'+(blocks.length+1)+'.webm',external:false,pauseAfter:DEFAULT_SILENCE});
    startIndex=blocks.length-1;
    recordingBusy=false;
    marcarSinGuardar('Cambios sin guardar: audio agregado. Tocá Guardar proyecto ZIP.');
    render();
  };
  mediaRecorder.start(250);
  startLiveRecordingBlock();
  startMeter();
  updateBtns();
  status.textContent='Grabando... hablá ahora.';
}catch(e){
  recordingBusy=false;
  stopLiveRecordingBlock();
  releaseMic();
  updateBtns();
  status.textContent='No se pudo acceder al micrófono. Revisá permisos y usá HTTPS o localhost.';
}};
function detenerGrabacionRobusta(ev){
  if(ev){
    ev.preventDefault();
    ev.stopPropagation();
  }
  if(mediaRecorder && mediaRecorder.state==='recording'){
    try{ mediaRecorder.requestData && mediaRecorder.requestData(); }catch(e){}
    try{ mediaRecorder.stop(); }catch(e){
      recordingBusy=false;
      stopLiveRecordingBlock();
      stopMeter();
      releaseMic();
      updateBtns();
      status.textContent='Grabación detenida.';
    }
  }else{
    recordingBusy=false;
    stopLiveRecordingBlock();
    stopMeter();
    releaseMic();
    updateBtns();
  }
}
// V34 iPad: además del click normal, escucho pointer/touch directo.
// En algunos iPad el segundo toque sobre Detener puede quedar tomado raro por el click diferido.
stopBtn.onclick=detenerGrabacionRobusta;
stopBtn.addEventListener('pointerdown', (ev)=>{
  if(estaGrabando()) detenerGrabacionRobusta(ev);
}, {passive:false});
stopBtn.addEventListener('touchstart', (ev)=>{
  if(estaGrabando()) detenerGrabacionRobusta(ev);
}, {passive:false});

async function trimBlobEnd(blob, seconds=0.32){
  // Recorta una pequeña cola para que no quede capturado el clic de “Detener”.
  // Si el navegador no puede decodificar el formato, devuelve el original.
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const arr=await blob.arrayBuffer();
    const buf=await ctx.decodeAudioData(arr.slice(0));
    const keep=Math.max(0.12, buf.duration-seconds);
    const frames=Math.max(1, Math.floor(keep*buf.sampleRate));
    const off=new OfflineAudioContext(buf.numberOfChannels, frames, buf.sampleRate);
    const src=off.createBufferSource(); src.buffer=buf; src.connect(off.destination); src.start(0);
    const rendered=await off.startRendering();
    try{ctx.close()}catch(e){}
    return new Blob([bufferToWav(rendered)],{type:'audio/wav'});
  }catch(e){ return blob; }
}
async function playSingle(i){
  if(estaGrabando()) return;
  if(!blocks.length) return;

  // Si ya hay algo sonando, lo corto y arranco el nuevo bloque.
  // El playRunId evita que timers viejos corten el bloque nuevo cuando hacés doble clic rápido.
  if(playing){
    stopPlayback(false);
    await new Promise(r=>setTimeout(r,20));
  }

  const runId=++playRunId;
  startIndex=i;
  renderConScrollQuieto();

  try{
    playing=true; updateBtns(); head.style.display='block'; status.textContent='Escuchando solo el bloque '+(i+1)+'...';
    playCtx=new (window.AudioContext||window.webkitAudioContext)();
    const buf=await decode(blocks[i].blob, playCtx);

    // Si durante la decodificación el usuario ya eligió otro bloque, este intento queda cancelado.
    if(runId!==playRunId){ try{playCtx.close()}catch(e){} return; }

    playOffset=offsetWithPauses(i);
    playStartedAt=playCtx.currentTime;
    playSources=[];
    const src=playCtx.createBufferSource(); src.buffer=buf;
    const gain=playCtx.createGain(); gain.gain.value=Number(vol.value);
    src.connect(gain).connect(playCtx.destination); src.start(playStartedAt);
    playSources.push({src,gain});
    animateSmooth(totalDurationWithPauses(), buf.duration);
    setTimeout(()=>{ if(playing && runId===playRunId) stopPlayback(false); }, Math.max(50,buf.duration*1000+80));
  }catch(e){
    if(runId===playRunId){ stopPlayback(false); status.textContent='No pude reproducir ese bloque.'; }
  }
}

async function playSequence(){
  if(estaGrabando()) return;
  if(!blocks.length || playing) return;
  const runId=++playRunId;
  try{
    playing=true; updateBtns(); head.style.display='block'; status.textContent='Preparando reproducción...';
    playCtx=new (window.AudioContext||window.webkitAudioContext)();
    const chosen=blocks.slice(startIndex);
    const buffers=[];
    for(const b of chosen){ buffers.push(await decode(b.blob, playCtx)); }
    if(!playing || runId!==playRunId) return;
    const total=totalDurationWithPauses();
    playOffset=offsetWithPauses(startIndex);
    playStartedAt=playCtx.currentTime;
    let t=0; playSources=[];
    buffers.forEach((buf,j)=>{ const src=playCtx.createBufferSource(); src.buffer=buf; const gain=playCtx.createGain(); gain.gain.value=Number(vol.value); src.connect(gain).connect(playCtx.destination); src.start(playStartedAt+t); playSources.push({src,gain}); t+=buf.duration; const absoluteIndex=startIndex+j; if(absoluteIndex<blocks.length-1)t+=getPauseAfter(absoluteIndex); });
    animateSmooth(total, t);
    status.textContent='Reproduciendo secuencia...';
    setTimeout(()=>{ if(playing && runId===playRunId) stopPlayback(false); }, Math.max(50,t*1000+80));
  }catch(e){ if(runId===playRunId){ stopPlayback(true); status.textContent='No pude reproducir la secuencia en este navegador.'; } }
}
function animateSmooth(total, remaining){
  cancelAnimationFrame(raf);
  const loop=()=>{
    if(!playing||!playCtx)return;
    const elapsed=Math.min(remaining, Math.max(0, playCtx.currentTime-playStartedAt));
    const now=playOffset+elapsed;
    const available=timeline.clientWidth-4;
    head.style.left=(12+(now/total)*available)+'px';
    raf=requestAnimationFrame(loop);
  };
  loop();
}
function stopPlayback(paused=true){
  playRunId++;
  playing=false;
  if(currentAudio){currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); currentAudio=null;}
  playSources.forEach(o=>{try{o.src.stop()}catch(e){}}); playSources=[];
  if(playCtx){try{playCtx.close()}catch(e){} playCtx=null;}
  cancelAnimationFrame(raf); head.style.display='none'; updateBtns(); status.textContent=paused?'Pausado.':'Listo.';
}
playBtn.onclick=()=>{startIndex=0; render(); status.textContent='Reproduciendo desde el comienzo...'; playSequence();};
pauseBtn.onclick=()=>stopPlayback(true);
vol.oninput=()=>{if(currentAudio)currentAudio.volume=Number(vol.value); playSources.forEach(o=>{if(o.gain)o.gain.gain.value=Number(vol.value);});};
async function decode(blob,ctx){const arr=await blob.arrayBuffer(); return await ctx.decodeAudioData(arr.slice(0));}
async function exportWav(){if(estaGrabando()) return; status.textContent='Preparando WAV...'; try{const total=totalDurationWithPauses()+1; const ctx=new OfflineAudioContext(1, 44100*Math.ceil(total), 44100); let t=0; for(let i=0;i<blocks.length;i++){const b=blocks[i]; const buf=await decode(b.blob,ctx); const src=ctx.createBufferSource(); src.buffer=buf; src.connect(ctx.destination); src.start(t); t+=buf.duration; if(i<blocks.length-1)t+=getPauseAfter(i);} const rendered=await ctx.startRendering(); const wav=bufferToWav(rendered); download(new Blob([wav],{type:'audio/wav'}),'podcast-final.wav'); status.textContent='WAV exportado.';}catch(e){status.textContent='No pude exportar WAV en este navegador.';}}
function bufferToWav(buffer){const len=buffer.length, data=buffer.getChannelData(0), ab=new ArrayBuffer(44+len*2), v=new DataView(ab); function w(o,s){for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));} w(0,'RIFF'); v.setUint32(4,36+len*2,true); w(8,'WAVE'); w(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true); v.setUint32(24,buffer.sampleRate,true); v.setUint32(28,buffer.sampleRate*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true); w(36,'data'); v.setUint32(40,len*2,true); let off=44; for(let i=0;i<len;i++,off+=2){let s=Math.max(-1,Math.min(1,data[i])); v.setInt16(off,s<0?s*0x8000:s*0x7fff,true);} return ab;}
function download(blob,name){const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
wavBtn.onclick=exportWav;
saveBtn.onclick=async()=>{ if(estaGrabando()) return; if(typeof JSZip==='undefined'){status.textContent='No cargó JSZip. Para subirlo online debería funcionar con internet.';return;} status.textContent='Armando ZIP...'; const zip=new JSZip(); const aud=zip.folder('audios'); const project={version:2,created:new Date().toISOString(),defaultSilence:DEFAULT_SILENCE,blocks:[]}; for(let i=0;i<blocks.length;i++){const b=blocks[i]; const ext=(b.type.includes('wav')?'wav':b.type.includes('mpeg')?'mp3':'webm'); const filename=`audio-${i+1}.${ext}`; aud.file(filename,b.blob); project.blocks.push({name:b.name,duration:b.duration,color:b.color,filename:'audios/'+filename,type:b.type,external:!!b.external,pauseAfter:getPauseAfter(i)});} zip.file('proyecto.json',JSON.stringify(project,null,2)); const blob=await zip.generateAsync({type:'blob'}); download(blob,'proyecto-podcast.zip'); marcarGuardado('✓ Proyecto ZIP guardado.');};
$('loadBtn').onclick=()=>{ if(estaGrabando()) return; $('projectFile').click(); }; $('projectFile').onchange=e=>{if(e.target.files[0])loadZip(e.target.files[0]); e.target.value='';};

$('addAudioBtn').onclick=()=>{ if(estaGrabando()) return; $('audioFile').click(); };
$('audioFile').onchange=e=>{ if(e.target.files.length) addExternalFiles([...e.target.files], blocks.length); e.target.value=''; };
function mediaDuration(file){
  return new Promise(res=>{
    const isVideo=(file.type||'').startsWith('video/');
    const el=document.createElement(isVideo?'video':'audio');
    el.preload='metadata';
    el.onloadedmetadata=()=>{ URL.revokeObjectURL(el.src); res(isFinite(el.duration)?el.duration:1); };
    el.onerror=()=>{ try{URL.revokeObjectURL(el.src)}catch(e){}; res(1); };
    el.src=URL.createObjectURL(file);
  });
}
async function addExternalFiles(files, insertAt=blocks.length){
  if(estaGrabando()) return;
  const usable=files.filter(f=>(f.type||'').startsWith('audio/') || (f.type||'').startsWith('video/'));
  if(!usable.length){status.textContent='Ese archivo no parece audio/video. Probá con MP3, WAV, M4A, WEBM o un video con audio.'; return;}
  status.textContent='Agregando audio externo...';
  let idx=Math.max(0,Math.min(insertAt,blocks.length));
  for(const f of usable){
    const dur=await mediaDuration(f);
    const extColor='#dde8f5';
    const item={id:crypto.randomUUID(),name:f.name.replace(/\.[^.]+$/,''),duration:dur,color:extColor,blob:f,type:f.type||'application/octet-stream',filename:f.name,external:true,pauseAfter:DEFAULT_SILENCE};
    blocks.splice(idx,0,item); idx++;
  }
  startIndex=Math.max(0,idx-1); marcarSinGuardar('Cambios sin guardar: audio externo insertado.'); render();
}
function insertionIndexFromPoint(clientX){
  const els=[...timeline.querySelectorAll('.block')];
  if(!els.length)return 0;
  for(let i=0;i<els.length;i++){
    const r=els[i].getBoundingClientRect();
    if(clientX < r.left + r.width/2) return i;
  }
  return els.length;
}
$('wrap').addEventListener('dragover',e=>{ if(e.dataTransfer && e.dataTransfer.types && [...e.dataTransfer.types].includes('Files')){e.preventDefault(); drop.classList.add('drag');} });
$('wrap').addEventListener('drop',e=>{
  if(estaGrabando()) return;
  const files=[...e.dataTransfer.files];
  const media=files.filter(f=>(f.type||'').startsWith('audio/') || (f.type||'').startsWith('video/'));
  if(media.length){ e.preventDefault(); e.stopPropagation(); drop.classList.remove('drag'); addExternalFiles(media, insertionIndexFromPoint(e.clientX)); }
});

async function loadZip(file){if(estaGrabando()) return; try{ if(typeof JSZip==='undefined')throw new Error('JSZip no disponible'); status.textContent='Abriendo proyecto...'; const zip=await JSZip.loadAsync(file); const pjFile=zip.file('proyecto.json'); if(!pjFile)throw new Error('Sin proyecto.json'); const pj=JSON.parse(await pjFile.async('string')); const nb=[]; for(const item of pj.blocks){const f=zip.file(item.filename); if(!f)continue; const blob=await f.async('blob'); nb.push({id:crypto.randomUUID(),name:item.name,duration:item.duration,color:item.color,blob:new Blob([blob],{type:item.type||blob.type}),type:item.type||blob.type,filename:item.filename,external:!!item.external,pauseAfter:Number(item.pauseAfter ?? DEFAULT_SILENCE)});} blocks=nb; startIndex=0; marcarGuardado('✓ Proyecto cargado. Tocá un bloque para ubicarte; doble toque para escuchar solo ese bloque.'); render();}catch(e){status.textContent='No pude abrir ese ZIP de proyecto.';}}
const drop=$('drop'); ['dragenter','dragover'].forEach(ev=>{document.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag')});}); ['dragleave','drop'].forEach(ev=>{document.addEventListener(ev,e=>{e.preventDefault(); if(ev==='drop')drop.classList.remove('drag')});}); document.addEventListener('drop',e=>{if(estaGrabando()) return; const files=[...e.dataTransfer.files]; const f=files.find(x=>x.name.toLowerCase().endsWith('.zip')); const media=files.filter(x=>(x.type||'').startsWith('audio/') || (x.type||'').startsWith('video/')); if(f)loadZip(f); else if(media.length)addExternalFiles(media, insertionIndexFromPoint(e.clientX)); else status.textContent='Arrastrá un ZIP de proyecto o un archivo de audio/video.';});
window.addEventListener('pagehide',()=>{ recordingBusy=false; stopLiveRecordingBlock(); if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop(); else releaseMic(); });
render();
</script>
